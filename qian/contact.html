<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系学生</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .contact-container {
            width: 1200px; 
        }

        /* 头部样式 */
        .contact-header {
            background: white;
            padding: 25px 30px;
            border-radius: 10px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header-title h1 {
            color: #333;
            font-size: 24px;
        }
        
        .header-title .student-info {
            color: #666;
            font-size: 16px;
            margin-top: 5px;
        }
        
        .header-actions {
            display: flex;
            gap: 10px;
        }
        
        .back-btn {
            background: #f8f9fa;
            color: #495057;
            border: 1px solid #dee2e6;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
        }
        
        .back-btn:hover {
            background: #e9ecef;
        }
        
        /* 主内容区域 */
        .contact-main {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        
        /* 左侧联系表单 */
        .contact-form-section {
            flex: 3;
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
            padding: 30px;
        }
        
        .section-title {
            font-size: 20px;
            color: #333;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        /* 表单样式 */
        .contact-form {
            display: grid;
            gap: 20px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .form-label {
            color: #555;
            font-weight: 500;
        }
        
        .form-select, .form-textarea {
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            background: #fafafa;
            transition: border-color 0.3s;
        }
        
        .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: #667eea;
            background: white;
        }
        
        .form-textarea {
            min-height: 120px;
            resize: vertical;
        }
        
        .template-suggestions {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }
        
        .template-btn {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            text-align: left;
        }
        
        .template-btn:hover {
            background: #e9ecef;
        }
        
        .form-actions {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .btn-primary:hover {
            background: #5a67d8;
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .btn-secondary:hover {
            background: #5a6268;
        }
        
        /* 右侧联系历史 */
        .contact-history-section {
            flex: 2;
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
            padding: 30px;
        }
        
        .history-list {
            max-height: 500px;
            overflow-y: auto;
        }
        
        .history-item {
            padding: 15px;
            border-left: 3px solid #667eea;
            background: #f8f9fa;
            margin-bottom: 15px;
            border-radius: 0 6px 6px 0;
        }
        
        .history-item.replied {
            border-left-color: #28a745;
        }
        
        .history-item.failed {
            border-left-color: #dc3545;
        }
        
        .history-method {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-right: 10px;
        }
        
        .history-time {
            color: #999;
            font-size: 12px;
        }
        
        .history-content {
            margin: 8px 0;
            color: #333;
        }
        
        .history-status {
            font-size: 12px;
            color: #666;
        }
        
        /* 状态提示 */
        .status-message {
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }
        
        .status-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .status-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .contact-main {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="contact-container">
        <!-- 状态提示区域 -->
        <div id="statusMessage" class="status-message"></div>
        
        <!-- 页面头部 -->
        <div class="contact-header">
            <div class="header-title">
                <h1>联系学生</h1>
                <div id="studentInfo" class="student-info">正在加载学生信息...</div>
            </div>
            <div class="header-actions">
                <a href="teacher.html" class="back-btn">返回</a>
            </div>
        </div>
        
        <!-- 主要内容区域 -->
        <div class="contact-main">
            <!-- 左侧：联系表单 -->
            <section class="contact-form-section">
                <h2 class="section-title">发送联系消息</h2>
                <form id="contactForm" class="contact-form">
                    <!-- 联系方式选择 -->
                    <div class="form-group">
                        <label class="form-label">联系方式 *</label>
                        <select id="contactMethod" class="form-select" required>
                            <option value="">请选择联系方式</option>
                            <option value="电话">电话联系</option>
                            <option value="短信">短信通知</option>
                            <option value="邮件">邮件通知</option>
                            <option value="站内信">站内消息</option>
                        </select>
                    </div>
                    
                    <!-- 联系内容 -->
                    <div class="form-group">
                        <label class="form-label">联系内容 *</label>
                        <textarea id="contactContent" class="form-textarea" 
                                  placeholder="请输入联系内容..." required></textarea>
                        
                        <!-- 快速模板 -->
                        <div class="template-suggestions">
                            <button type="button" class="template-btn" onclick="useTemplate(1)">
                                异常消费提醒模板
                            </button>
                            <button type="button" class="template-btn" onclick="useTemplate(2)">
                                会议邀请模板
                            </button>
                            <button type="button" class="template-btn" onclick="useTemplate(3)">
                                家长联系模板
                            </button>
                        </div>
                    </div>
                    
                    <!-- 备注 -->
                    <div class="form-group">
                        <label class="form-label">备注（可选）</label>
                        <textarea id="contactRemark" class="form-textarea" 
                                  placeholder="可添加额外说明..."></textarea>
                    </div>
                    
                    <!-- 操作按钮 -->
                    <div class="form-actions">
                        <button type="submit" class="btn-primary" id="submitBtn">
                            发送联系
                        </button>
                        <button type="button" class="btn-secondary" onclick="saveDraft()">
                            保存草稿
                        </button>
                    </div>
                </form>
            </section>
            
            <!-- 右侧：联系历史 -->
            <section class="contact-history-section">
                <h2 class="section-title">联系历史记录</h2>
                <div id="historyList" class="history-list">
                    <!-- 历史记录会动态加载 -->
                    <div class="history-item">
                        <div class="history-header">
                            <span class="history-method">站内信</span>
                            <span class="history-time">2026-03-15 14:30</span>
                        </div>
                        <div class="history-content">
                            关于您本月消费情况的提醒...
                        </div>
                        <div class="history-status">状态：已发送</div>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script>
        // 从URL获取学生信息
        const urlParams = new URLSearchParams(window.location.search);
        const studentId = urlParams.get('studentId');
        const studentName = urlParams.get('studentName');
        
        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', function() {
            if (studentId && studentName) {
                // 显示学生信息
                document.getElementById('studentInfo').textContent = 
                    `学生：${studentName} (学号：${studentId})`;
                
                // 设置默认联系内容
                document.getElementById('contactContent').value = 
                    `您好${studentName}同学，我们发现您在2026年3月的消费情况存在异常。\n\n` +
                    `请确认是否为正常消费行为，如有疑问请及时联系我们。\n\n` +
                    `祝学习进步！`;
                
                // 加载联系历史
                loadContactHistory(studentId);
            } else {
                showError('未获取到学生信息，请返回重新选择学生。');
            }
        });
        
        // 表单提交处理
        document.getElementById('contactForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const teacherId = JSON.parse(localStorage.getItem('currentUser')).student_id; 
            const contactMethod = document.getElementById('contactMethod').value;
            const contactContent = document.getElementById('contactContent').value;
            const contactRemark = document.getElementById('contactRemark').value;
            
            if (!contactMethod) {
                showError('请选择联系方式');
                return;
            }
            
            // 显示加载状态
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = '发送中...';
            
            try {
                const response = await fetch('http://localhost:3000/api/teacher/contact', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        teacherId: teacherId,
                        studentId: studentId,
                        contactMethod: contactMethod,
                        contactContent: contactContent,
                        remark: contactRemark
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showSuccess('联系已成功发送！');
                    // 重置表单
                    document.getElementById('contactForm').reset();
                    // 重新加载历史记录
                    loadContactHistory(studentId);
                } else {
                    showError(`发送失败：${data.message}`);
                }
            } catch (error) {
                showError('网络错误，请检查连接后重试');
                console.error('发送失败：', error);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '发送联系';
            }
        });
        
        // 加载联系历史
        async function loadContactHistory(studentId) {
            const teacherId = localStorage.getItem('teacherId') || 'T001';
            const historyList = document.getElementById('historyList');
            
            try {
                const response = await fetch(
                    `http://localhost:3000/api/teacher/contact/history?teacherId=${teacherId}&studentId=${studentId}`
                );
                const data = await response.json();
                
                if (data.success && data.data && data.data.length > 0) {
                    let html = '';
                    data.data.forEach(record => {
                        const date = new Date(record.contact_time);
                        const timeStr = `${date.getFullYear()}-${(date.getMonth()+1).toString().padStart(2, '0')}-${date.getDate().toString().padStart(2, '0')} ${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;
                        
                        html += `
                            <div class="history-item ${record.status === '已联系' ? 'replied' : record.status === '联系失败' ? 'failed' : ''}">
                                <div class="history-header">
                                    <span class="history-method">${record.contact_method}</span>
                                    <span class="history-time">${timeStr}</span>
                                </div>
                                <div class="history-content">${record.contact_content}</div>
                                <div class="history-status">状态：${record.status}${record.remark ? `，备注：${record.remark}` : ''}</div>
                            </div>
                        `;
                    });
                    historyList.innerHTML = html;
                } else {
                    historyList.innerHTML = '<div style="text-align: center; padding: 20px; color: #666;">暂无联系历史记录</div>';
                }
            } catch (error) {
                console.error('加载历史记录失败：', error);
                historyList.innerHTML = '<div style="text-align: center; padding: 20px; color: #dc3545;">加载失败，请刷新重试</div>';
            }
        }
        
        // 使用模板
        function useTemplate(templateId) {
            const contentField = document.getElementById('contactContent');
            const templates = {
                1: `您好${studentName}同学，\n\n我们发现您在2026年3月的消费情况存在异常。\n\n请确认是否为正常消费行为，如有疑问请及时联系我们。\n\n教务处`,
                2: `尊敬的${studentName}同学，\n\n邀请您参加本周五下午3点的班会，我们将讨论消费管理和财务规划的相关内容。\n\n期待您的参与。`,
                3: `尊敬的家长，\n\n我们发现您的孩子${studentName}同学近期消费情况存在异常，建议您关注并与我们保持沟通。\n\n班主任`
            };
            
            if (templates[templateId]) {
                contentField.value = templates[templateId];
                showSuccess('模板已应用');
            }
        }
        
        // 保存草稿
        function saveDraft() {
            const draft = {
                method: document.getElementById('contactMethod').value,
                content: document.getElementById('contactContent').value,
                remark: document.getElementById('contactRemark').value,
                studentId: studentId,
                studentName: studentName
            };
            
            localStorage.setItem(`contactDraft_${studentId}`, JSON.stringify(draft));
            showSuccess('草稿已保存');
        }
        
        // 加载草稿
        function loadDraft() {
            const draftStr = localStorage.getItem(`contactDraft_${studentId}`);
            if (draftStr) {
                const draft = JSON.parse(draftStr);
                if (draft.studentId === studentId) {
                    document.getElementById('contactMethod').value = draft.method;
                    document.getElementById('contactContent').value = draft.content;
                    document.getElementById('contactRemark').value = draft.remark;
                    showSuccess('已加载保存的草稿');
                }
            }
        }
        
        // 显示成功消息
        function showSuccess(message) {
            const statusEl = document.getElementById('statusMessage');
            statusEl.textContent = message;
            statusEl.className = 'status-message status-success';
            statusEl.style.display = 'block';
            
            setTimeout(() => {
                statusEl.style.display = 'none';
            }, 3000);
        }
        
        // 显示错误消息
        function showError(message) {
            const statusEl = document.getElementById('statusMessage');
            statusEl.textContent = message;
            statusEl.className = 'status-message status-error';
            statusEl.style.display = 'block';
        }
    </script>

</body>
</html>
